name: Verify Proofs

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  check-proofs:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - name: Install elan
        run: |
          curl https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh -sSf | sh -s -- -y
          echo "$HOME/.elan/bin" >> $GITHUB_PATH

      - name: Cache .lake
        uses: actions/cache@v4
        with:
          path: .lake
          key: lake-${{ hashFiles('lean-toolchain', 'lakefile.lean', 'lake-manifest.json') }}
          restore-keys: lake-

      - name: Build proofs
        run: |
          lake build LeanMlir.Proofs.Tensor \
                     LeanMlir.Proofs.MLP \
                     LeanMlir.Proofs.CNN \
                     LeanMlir.Proofs.BatchNorm \
                     LeanMlir.Proofs.Residual \
                     LeanMlir.Proofs.Depthwise \
                     LeanMlir.Proofs.SE \
                     LeanMlir.Proofs.LayerNorm \
                     LeanMlir.Proofs.Attention

      - name: Check for sorry
        run: |
          if lake build LeanMlir.Proofs.Tensor LeanMlir.Proofs.MLP LeanMlir.Proofs.CNN LeanMlir.Proofs.BatchNorm LeanMlir.Proofs.Residual LeanMlir.Proofs.Depthwise LeanMlir.Proofs.SE LeanMlir.Proofs.LayerNorm LeanMlir.Proofs.Attention 2>&1 | grep -q "sorry"; then
            echo "::warning::Found sorry in proofs"
            lake build LeanMlir.Proofs.Tensor LeanMlir.Proofs.MLP LeanMlir.Proofs.CNN LeanMlir.Proofs.BatchNorm LeanMlir.Proofs.Residual LeanMlir.Proofs.Depthwise LeanMlir.Proofs.SE LeanMlir.Proofs.LayerNorm LeanMlir.Proofs.Attention 2>&1 | grep "sorry"
          else
            echo "All proofs verified - zero sorry"
          fi

      - name: Numerical gradient checks
        run: python3 LeanMlir/Proofs/check_axioms.py
